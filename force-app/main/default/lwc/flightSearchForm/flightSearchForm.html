<template>
    <div class="fsf-container">

        <div class="fsf-header slds-m-bottom_medium">
            <svg class="fsf-header-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="currentColor" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"></path>
            </svg>
            <div>
                <h2 class="fsf-title slds-text-heading_medium">Search Flights</h2>
                <p class="fsf-subtitle slds-text-body_small">Find the best fares for your trip</p>
            </div>
        </div>

        <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 fsf-autocomplete-col">
                <label class="fsf-field-label" for="origin-input">Origin Airport</label>
                <div class="fsf-autocomplete">
                    <input
                        id="origin-input"
                        class="fsf-input fsf-autocomplete-input"
                        type="text"
                        autocomplete="off"
                        placeholder="City, airport, or code — e.g. Hyderabad"
                        value={originQuery}
                        oninput={handleOriginInput}
                        onblur={handleOriginBlur}
                        onfocus={handleOriginInput} />

                    <template if:true={showOriginSuggestions}>
                        <ul class="fsf-suggestion-list">
                            <template for:each={originSuggestions} for:item="airport">
                                <li
                                    key={airport.code}
                                    class="fsf-suggestion-item"
                                    data-code={airport.code}
                                    onmousedown={handleSelectOrigin}>
                                    <span class="fsf-suggestion-code">{airport.code}</span>
                                    <span class="fsf-suggestion-detail">
                                        {airport.city} — {airport.name}
                                    </span>
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 fsf-autocomplete-col">
                <label class="fsf-field-label" for="destination-input">Destination Airport</label>
                <div class="fsf-autocomplete">
                    <input
                        id="destination-input"
                        class="fsf-input fsf-autocomplete-input"
                        type="text"
                        autocomplete="off"
                        placeholder="City, airport, or code — e.g. Delhi"
                        value={destinationQuery}
                        oninput={handleDestinationInput}
                        onblur={handleDestinationBlur}
                        onfocus={handleDestinationInput} />

                    <template if:true={showDestinationSuggestions}>
                        <ul class="fsf-suggestion-list">
                            <template for:each={destinationSuggestions} for:item="airport">
                                <li
                                    key={airport.code}
                                    class="fsf-suggestion-item"
                                    data-code={airport.code}
                                    onmousedown={handleSelectDestination}>
                                    <span class="fsf-suggestion-code">{airport.code}</span>
                                    <span class="fsf-suggestion-detail">
                                        {airport.city} — {airport.name}
                                    </span>
                                </li>
                            </template>
                        </ul>
                    </template>
                </div>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-top_medium">
                <lightning-input
                    class="fsf-input"
                    type="date"
                    label="Departure Date"
                    name="departureDate"
                    value={departureDate}
                    onchange={handleInputChange}
                    required>
                </lightning-input>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-top_medium">
                <lightning-combobox
                    class="fsf-input"
                    label="Cabin Class"
                    name="cabinClass"
                    value={cabinClass}
                    options={cabinOptions}
                    onchange={handleInputChange}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-top_medium">
                <lightning-input
                    class="fsf-input"
                    type="number"
                    label="Adults"
                    name="adults"
                    value={adults}
                    min="1"
                    max="9"
                    onchange={handleInputChange}
                    required>
                </lightning-input>
            </div>

            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-top_medium">
                <lightning-radio-group
                    class="fsf-trip-type fsf-radio-label"
                    label="Trip Type"
                    name="tripType"
                    options={tripTypeOptions}
                    value={tripType}
                    type="button"
                    onchange={handleInputChange}>
                </lightning-radio-group>
            </div>

            <template if:true={isRoundTrip}>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-top_medium">
                    <lightning-input
                        class="fsf-input"
                        type="date"
                        label="Return Date"
                        name="returnDate"
                        value={returnDate}
                        onchange={handleInputChange}>
                    </lightning-input>
                </div>
            </template>

        </div>

        <div class="fsf-actions slds-m-top_large">
            <lightning-button
                class="fsf-btn-search"
                variant="brand"
                label="Search Flights"
                onclick={handleSearch}>
            </lightning-button>

            <lightning-button
                class="fsf-btn-reset slds-m-left_small"
                label="Reset"
                onclick={handleReset}>
            </lightning-button>
        </div>
    </div>
</template>
