<template>
    <lightning-card title="Refund Status Tracker" icon-name="utility:money" class="rst-card">
        <div class="slds-p-around_medium rst-container">

            <template if:true={refund}>
                <div class="rst-progress-wrap">
                    <lightning-progress-indicator
                        current-step={currentStep}
                        type="path"
                        variant="base">

                        <lightning-progress-step
                            label="Initiated"
                            value="Initiated">
                        </lightning-progress-step>

                        <lightning-progress-step
                            label="Processing"
                            value="Processing">
                        </lightning-progress-step>

                        <lightning-progress-step
                            label="Completed"
                            value="Completed">
                        </lightning-progress-step>

                        <lightning-progress-step
                            label="Rejected"
                            value="Rejected">
                        </lightning-progress-step>

                    </lightning-progress-indicator>
                </div>

                <div class="rst-detail-card slds-m-top_medium">
                    <div class="rst-item"><span class="rst-label">Status</span><span class="rst-value rst-status-pill">{refund.Refund_Status__c}</span></div>
                    <div class="rst-item"><span class="rst-label">Amount</span><span class="rst-value rst-amount">{refund.Refund_Amount__c}</span></div>
                    <div class="rst-item"><span class="rst-label">Requested Date</span><span class="rst-value">{refund.Requested_Date__c}</span></div>
                    <div class="rst-item"><span class="rst-label">Completed Date</span><span class="rst-value">{refund.Completed_Date__c}</span></div>
                    <div class="rst-item"><span class="rst-label">Reference</span><span class="rst-value">{refund.Refund_Reference__c}</span></div>
                </div>
            </template>

            <template if:true={noRefundFound}>
                <div class="rst-empty-state">
                    <span class="slds-assistive-text">Warning</span>
                    No refund record found for this booking.
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_error rst-error">
                    <span class="slds-assistive-text">Error</span>
                    {errorMessage}
                </div>
            </template>

            <div class="slds-m-top_medium rst-actions">
                <lightning-button
                    class="rst-btn-close"
                    label="Close"
                    onclick={handleClose}>
                </lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
