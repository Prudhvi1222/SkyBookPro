<template>
    <section
        role="dialog"
        tabindex="-1"
        aria-modal="true"
        class="slds-modal slds-fade-in-open cm-modal">

        <div class="slds-modal__container cm-modal-container">

            <header class="slds-modal__header cm-header">
                <button
                    class="slds-button slds-button_icon slds-modal__close cm-close-btn"
                    title="Close"
                    onclick={handleClose}>
                    <lightning-icon
                        icon-name="utility:close"
                        alternative-text="close"
                        size="small">
                    </lightning-icon>
                </button>

                <span class="cm-header-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
                    </svg>
                </span>
                <h2 class="slds-text-heading_medium cm-title">
                    Cancel Booking
                </h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium cm-content">

                <div class="cm-summary-card slds-m-bottom_medium">
                    <div class="cm-summary-row"><span class="cm-label">Booking Reference</span><span class="cm-value">{booking.Name}</span></div>
                    <div class="cm-summary-row"><span class="cm-label">Route</span><span class="cm-value">{booking.route}</span></div>
                    <div class="cm-summary-row"><span class="cm-label">Status</span><span class="cm-value">{booking.Booking_Status__c}</span></div>
                    <div class="cm-summary-row"><span class="cm-label">Total Amount</span><span class="cm-value cm-amount">{booking.Total_Amount__c}</span></div>
                </div>

                <lightning-textarea
                    class="cm-textarea"
                    label="Cancellation Reason"
                    value={reason}
                    onchange={handleReasonChange}
                    required>
                </lightning-textarea>

                <div class="cm-warning-box slds-m-top_medium" role="alert">
                    <svg class="cm-warning-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path fill="currentColor" d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"></path>
                    </svg>
                    <span class="slds-assistive-text">Warning</span>
                    Cancelling this booking will update the booking status and initiate refund processing.
                </div>

                <template if:true={isProcessing}>
                    <div class="slds-m-top_medium cm-processing">
                        <lightning-spinner
                            alternative-text="Cancelling booking"
                            size="medium">
                        </lightning-spinner>
                    </div>
                </template>

            </div>

            <footer class="slds-modal__footer cm-footer">
                <lightning-button
                    class="cm-btn-close"
                    label="Keep Booking"
                    onclick={handleClose}
                    disabled={isProcessing}>
                </lightning-button>

                <lightning-button
                    class="cm-btn-confirm slds-m-left_small"
                    variant="destructive"
                    label="Confirm Cancellation"
                    onclick={handleConfirmCancellation}
                    disabled={isProcessing}>
                </lightning-button>
            </footer>

        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open cm-backdrop"></div>
</template>
